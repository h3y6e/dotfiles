name: skills

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-skills:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
      - run: gh skill update --dir dot_agents/exact_skills --all
        env:
          GH_TOKEN: ${{ github.token }}
      - id: pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: skills-update
          commit-message: "fix(skills): update agent skills"
          title: "fix(skills): update agent skills"
          body: |
            Automated skill update by [`gh skill update`](https://cli.github.com/manual/gh_skill_update).
      - if: steps.pr.outputs.pull-request-number
        run: gh pr merge ${{ steps.pr.outputs.pull-request-number }} --auto --squash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
