name: skills

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-skills:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - id: skill-update
        uses: h3y6e/gh-skill-update-action@3d7a2c86170e04e07f0b06fa489e3c02dd51bd58 # v1.1.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          dir: dot_agents/exact_skills
      - if: steps.skill-update.outputs.pr-number != ''
        run: gh pr merge "${{ steps.skill-update.outputs.pr-number }}" --auto --squash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
