name: skills

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-skills:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          token: ${{ steps.app-token.outputs.token }}
      - uses: jdx/mise-action@f10502fc09dadecfefb962fff68ce77213930204 # v4.2.2
      - id: skill-update
        uses: h3y6e/gh-skill-update-action@ef708035a955ed549e143ad55d708e89e39f98c3 # v1.2.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          dir: dot_agents/exact_skills
      - if: steps.skill-update.outputs.pr-number != ''
        run: gh pr merge "${{ steps.skill-update.outputs.pr-number }}" --auto --squash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
