name: skills

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  update-skills:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
      - run: gh release download --repo h3y6e/skills --pattern 'skills_*_linux_amd64.tar.gz' --output - | tar xz -C /usr/local/bin skills
      - run: skills update -d dot_agents/exact_skills -y
      - id: pr
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: skills-update
          commit-message: "fix(skills): update agent skills"
          title: "fix(skills): update agent skills"
          body: |
            Automated skill update by [h3y6e/skills](https://github.com/h3y6e/skills).
      - if: steps.pr.outputs.pull-request-number
        run: gh pr merge ${{ steps.pr.outputs.pull-request-number }} --auto --squash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
