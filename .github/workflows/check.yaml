name: check

on:
  push:

jobs:
  install:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Show installer help
        run: ./install.sh -h
      - name: Install dotfiles
        run: ./install.sh
      - name: Check chezmoi
        run: chezmoi data -f yaml

  remote:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Remote install
        run: bash -c "$(curl -fsSL s.h3y6e.com/dotfiles)" -- -r
      - name: Check chezmoi
        shell: bash -i {0}
        run: cz managed
