#:tombi schema.strict = false
#:schema https://mise.jdx.dev/schema/mise.json

[bootstrap.packages]
"brew:aria2" = "latest"
"brew:chezmoi" = "latest"
"brew:git" = "latest"
"brew:gnupg" = "latest"
"brew:libyaml" = "latest"
"brew:mas" = "latest"
"brew:pinentry-mac" = "latest"
"brew:watchman" = "latest"

[settings]
activate_aggressive = true
cargo.binstall = true
color_theme = "catppuccin"
experimental = true
github.use_git_credentials = true
lockfile = true
minimum_release_age = "1d"
npm.package_manager = "aube"
pin = true
pipx.uvx = true
task.monorepo_depth = 2

[settings.status]
show_env = true
show_tools = true

# For Renovate:
# - Use short names if available (node, aws-cli), otherwise full names (aqua:peco/peco, npm:sfw)
#   https://docs.renovatebot.com/modules/manager/mise/#supported-default-registry-tool-short-names
#   https://mise.jdx.dev/registry.html#tools
# - Specify versions ("1.2.3") if Renovate recognizes them, otherwise "latest"
#   https://docs.renovatebot.com/modules/manager/mise/#limitations
[tools]
actionlint = "1.7.12"
"aqua:ByteNess/aws-vault" = "7.13.0"
"aqua:docker/buildx" = "0.35.0"
"aqua:k1LoW/git-wt" = "0.29.0"
ast-grep = "0.44.1"
